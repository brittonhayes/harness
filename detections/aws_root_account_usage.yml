title: AWS Root Account Usage
id: 0d4f2c8b-6a1e-4f3d-9b2c-7e5a1c9d8f06
status: experimental
description: |
  Detects any activity performed by the AWS account root user. The root account
  has unrestricted access and should only be used for the small set of tasks
  that require it. Routine or unexpected root usage — console logins, API calls,
  or CLI activity — is a strong signal of misuse, a compromised account, or a
  break-glass event that should be reviewed.
references:
  - https://attack.mitre.org/techniques/T1078/004/
  - https://docs.aws.amazon.com/IAM/latest/UserGuide/id_root-user.html
  - https://docs.aws.amazon.com/IAM/latest/UserGuide/best-practices.html
author: Harness
date: 2024-06-09
logsource:
  product: aws
  service: cloudtrail
detection:
  selection:
    userIdentity.type: Root
  # AWS-internal/service-triggered events are attributed to the account but are
  # not interactive root usage; exclude them to reduce noise.
  filter_service_event:
    eventType: AwsServiceEvent
  condition: selection and not filter_service_event
falsepositives:
  - Approved break-glass procedures performed under change control.
  - Account and billing tasks that can only be performed by the root user
    (e.g. changing the account name, support plan, or closing the account).
  - Initial account setup before IAM users/roles are provisioned.
level: high
tags:
  - attack.initial_access
  - attack.t1078.004
  - attack.privilege_escalation
runbook:
  triage:
    - Resolve the actor from userIdentity (arn, accessKeyId, sourceIPAddress)
      and the action from eventName. A console login differs from a programmatic
      API call by long-lived root keys (the latter is worse — root should have
      no access keys at all).
    - Decide whether this maps to a known break-glass window or change ticket.
  investigate:
    - Pull the root user's full CloudTrail activity for the surrounding hours.
      Root usage is rarely the goal; look at what was done while authenticated.
    - Check for MFA on the login and whether the source IP/geo is expected.
  contain:
    - If unexpected, rotate or delete root access keys, force re-auth, and
      enable/confirm MFA on the root user.
    - Preserve the accessKeyId and session details for scoping.
  escalate:
    - Page the on-call responder for any root API activity using long-lived
      access keys, or any root login from an unexpected location.
tests:
  - name: root console login fires
    event:
      userIdentity.type: Root
      eventName: ConsoleLogin
    match: true
  - name: root api call fires
    event:
      userIdentity.type: Root
      eventName: CreateAccessKey
    match: true
  - name: aws service event is filtered out
    event:
      userIdentity.type: Root
      eventType: AwsServiceEvent
    match: false
  - name: iam user activity does not fire
    event:
      userIdentity.type: IAMUser
      eventName: ConsoleLogin
    match: false
