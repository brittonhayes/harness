title: AWS S3 Bucket Deletion
id: dcece148-76d0-4e8c-b814-36d53f205a42
status: experimental
description: |
  Detects deletion of an S3 bucket via the CloudTrail DeleteBucket API call.
  Destroying buckets can result in irreversible data loss and is a common
  technique for impact/destruction or for covering tracks after an intrusion.
  Bucket deletion is normally infrequent and should be tied to a known change.
references:
  - https://attack.mitre.org/techniques/T1485/
  - https://docs.aws.amazon.com/AmazonS3/latest/API/API_DeleteBucket.html
author: Harness
date: 2024-06-09
logsource:
  product: aws
  service: cloudtrail
detection:
  selection:
    eventSource: s3.amazonaws.com
    eventName: DeleteBucket
  condition: selection
falsepositives:
  - Planned decommissioning of buckets under change control.
  - Infrastructure-as-code teardown of ephemeral/test environments.
  - Lifecycle automation that removes temporary buckets.
level: medium
tags:
  - attack.impact
  - attack.t1485
tests:
  - name: delete bucket fires
    event:
      eventSource: s3.amazonaws.com
      eventName: DeleteBucket
    match: true
  - name: bucket read does not fire
    event:
      eventSource: s3.amazonaws.com
      eventName: GetObject
    match: false
